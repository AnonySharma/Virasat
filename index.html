<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6B8765" />
  <meta name="description" content="A clean, calm workspace for building and exploring your family tree." />
  <title>Family Tree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..700,30..100&family=Inter:wght@400;500;600;700&family=Noto+Serif+Devanagari:wght@400;500;600&display=swap" />

  <!-- Font Awesome 6 (free CDN) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/views.css" />
  <link rel="icon" href="assets/tree.svg" />
</head>
<body>

  <!-- Header (sage band) -->
  <header class="app-header">
    <h1 class="app-title">
      <span class="app-title__icon" aria-hidden="true">
        <img src="assets/tree.svg" alt="" width="18" height="18" />
      </span>
      <span class="app-title__text" data-i18n="app.title">Family Tree</span>
    </h1>

    <nav class="app-nav" aria-label="Views">
      <button class="nav-btn is-active" data-view="tree" type="button">
        <i class="nav-btn__icon fa-solid fa-sitemap" aria-hidden="true"></i>
        <span class="nav-btn__label" data-i18n="nav.tree">Tree</span>
      </button>
      <button class="nav-btn" data-view="people" type="button">
        <i class="nav-btn__icon fa-solid fa-user-group" aria-hidden="true"></i>
        <span class="nav-btn__label" data-i18n="nav.people">People</span>
      </button>
      <button class="nav-btn" data-view="timeline" type="button">
        <i class="nav-btn__icon fa-solid fa-stream" aria-hidden="true"></i>
        <span class="nav-btn__label" data-i18n="nav.timeline">Timeline</span>
      </button>
    </nav>

    <label class="header-search">
      <i class="header-search__icon fa-solid fa-magnifying-glass" aria-hidden="true"></i>
      <input id="header-search-input" type="search" placeholder="Search people..." aria-label="Search people" />
    </label>

    <div class="app-header__actions">
      <div class="lang-switch" role="group" aria-label="Language">
        <button class="lang-switch__btn is-active" data-lang="en" type="button" title="English">EN</button>
        <button class="lang-switch__btn" data-lang="hi" type="button" title="हिन्दी">HI</button>
      </div>
      <button class="btn" id="collect-btn" type="button" title="Collect via Google Form">
        <i class="fa-solid fa-clipboard" aria-hidden="true"></i>
        <span class="btn__label-md" data-i18n="actions.collect">Collect</span>
      </button>
      <button class="btn" id="import-btn" type="button" title="Import">
        <i class="fa-solid fa-arrow-up-from-bracket" aria-hidden="true"></i>
        <span class="btn__label-md" data-i18n="actions.import">Import</span>
      </button>
      <button class="btn btn--primary" id="export-btn" type="button" title="Export">
        <i class="fa-solid fa-arrow-down-to-bracket" aria-hidden="true"></i>
        <span class="btn__label-md" data-i18n="actions.export">Export</span>
      </button>
    </div>
  </header>

  <!-- 3-pane body -->
  <div class="app-body">

    <!-- Left rail: filters / tools / stats / legacy CTA -->
    <aside class="app-rail" id="rail">
      <section class="rail-block">
        <h3 class="rail-heading">Overview</h3>
        <ul class="rail-list" id="rail-views">
          <li><button class="rail-item is-active" data-view="tree" type="button"><i class="fa-solid fa-sitemap"></i><span>Tree</span></button></li>
          <li><button class="rail-item" data-view="people" type="button"><i class="fa-solid fa-user-group"></i><span>People</span></button></li>
          <li><button class="rail-item" data-view="timeline" type="button"><i class="fa-solid fa-stream"></i><span>Timeline</span></button></li>
        </ul>
      </section>

      <section class="rail-block">
        <h3 class="rail-heading">Filter</h3>
        <ul class="rail-list" id="rail-filters">
          <li><button class="rail-item" data-filter="all" type="button"><i class="fa-solid fa-circle-dot"></i><span>All</span><span class="rail-count" id="cnt-all">0</span></button></li>
          <li><button class="rail-item" data-filter="alive" type="button"><i class="fa-solid fa-leaf" style="color: var(--sage)"></i><span>Living</span><span class="rail-count" id="cnt-alive">0</span></button></li>
          <li><button class="rail-item" data-filter="deceased" type="button"><i class="fa-regular fa-circle"></i><span>Deceased</span><span class="rail-count" id="cnt-deceased">0</span></button></li>
        </ul>
      </section>

      <section class="rail-block">
        <h3 class="rail-heading">Tools</h3>
        <ul class="rail-list">
          <li><button class="rail-item" id="tool-add" type="button"><i class="fa-solid fa-user-plus"></i><span>Add Person</span></button></li>
          <li><button class="rail-item" id="tool-add-couple" type="button"><i class="fa-solid fa-people-arrows"></i><span>Add Couple</span></button></li>
          <li><button class="rail-item" id="tool-edit" type="button"><i class="fa-regular fa-pen-to-square"></i><span>Edit Tree</span></button></li>
          <li><button class="rail-item" id="tool-settings" type="button"><i class="fa-solid fa-gear"></i><span>Tree Settings</span></button></li>
        </ul>
      </section>

      <section class="rail-block">
        <h3 class="rail-heading">Tree Statistics</h3>
        <dl class="rail-stats">
          <div class="rail-stat"><dt>Members</dt><dd id="stat-members">0</dd></div>
          <div class="rail-stat"><dt>Generations</dt><dd id="stat-generations">0</dd></div>
          <div class="rail-stat"><dt>Surnames</dt><dd id="stat-surnames">0</dd></div>
        </dl>
        <div class="rail-mini-cta">
          <i class="fa-solid fa-chart-pie"></i><span>View Analytics</span>
        </div>
      </section>

      <section class="rail-cta">
        <div class="rail-cta__title">Preserve your legacy</div>
        <p class="rail-cta__body">Names, photos, and stories — saved on your device.</p>
        <button class="btn btn--primary btn--block" id="cta-export" type="button">Get started</button>
      </section>
    </aside>

    <!-- Center main canvas -->
    <main class="app-main">
      <section class="view view--tree is-active" id="view-tree" aria-label="Family tree"></section>
      <section class="view view--people" id="view-people" aria-label="People"></section>
      <section class="view view--timeline" id="view-timeline" aria-label="Timeline"></section>
    </main>

    <!-- Right inspector -->
    <aside class="app-inspector" id="inspector">
      <div class="inspector-empty" id="inspector-empty">
        <i class="fa-solid fa-hand-pointer"></i>
        <div class="inspector-empty__title">Select a person</div>
        <div class="inspector-empty__text">Click anyone in the tree, list, or timeline to see their details here.</div>
      </div>
      <div class="inspector-content" id="inspector-content" hidden></div>
    </aside>

  </div>

  <div class="app-overlay" id="app-overlay"></div>
  <div class="modal-root" id="modal-root" aria-hidden="true"></div>
  <input type="file" id="import-file-input" accept="application/json,text/csv,.csv,.json" hidden />
  <div class="toast-root" id="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script src="js/i18n.js"></script>
  <script src="js/data-store.js"></script>
  <script src="js/photo-store.js"></script>
  <script src="js/ui-utils.js"></script>
  <script src="js/heritage-datepicker.js"></script>
  <script src="js/people-view.js"></script>
  <script src="js/tree-view.js"></script>
  <script src="js/timeline-view.js"></script>
  <script src="js/inspector.js"></script>
  <script src="js/profile-view.js"></script>
  <script src="js/image-export.js"></script>
  <script src="js/export-import.js"></script>
  <script src="js/collect-form.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
